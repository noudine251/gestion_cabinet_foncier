<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SNS Foncier — Gestion Foncière Professionnelle au Cameroun" />
    <meta property="og:title" content="SNS Foncier" />
    <meta property="og:description" content="Gestion Foncière Professionnelle au Cameroun" />
    <meta property="og:image" content="https://gestion-cabinet-foncier.vercel.app/logo.jpg" />
    <meta property="og:url" content="https://gestion-cabinet-foncier.vercel.app/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="https://gestion-cabinet-foncier.vercel.app/logo.jpg" />
    <title>SNS Foncier — Gestion Foncière Cameroun</title>
    <link rel="icon" type="image/png" href="logo.jpg" />
    <link rel="apple-touch-icon" href="logo.jpg" />
    <script>
      (function(){
        var img = new Image();
        img.onload = function(){
          var c = document.createElement('canvas');
          c.width = c.height = 64;
          var ctx = c.getContext('2d');
          ctx.beginPath();
          ctx.arc(32, 32, 32, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, 64, 64);
          var link = document.querySelector("link[rel='icon']");
          link.type = 'image/png';
          link.href = c.toDataURL('image/png');
        };
        img.src = 'logo.jpg';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <!--
      firebase.js installe __REACT_DEVTOOLS_GLOBAL_HOOK__ et intercepte
      Storage.prototype — doit être chargé AVANT app.js
    -->
    <script src="firebase.js"></script>
  </head>
  <body>
    <!-- Écran de chargement -->
    <div id="loading-screen" style="
      position: fixed; inset: 0;
      background: #F5F0E8;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      z-index: 9999;
    ">
      <div style="font-size: 32px; font-weight: 900; color: #1B4332; margin-bottom: 16px; letter-spacing: 2px;">SNS</div>
      <div style="font-weight: 800; font-size: 18px; color: #1B4332; margin-bottom: 6px;">SNS Foncier</div>
      <div style="font-size: 13px; color: #78716C; margin-bottom: 20px;">Synchronisation en cours...</div>
      <div style="width: 180px; height: 4px; background: #E8E0D4; border-radius: 10px; overflow: hidden;">
        <div id="loading-bar" style="
          height: 100%; width: 0%; background: #1B4332;
          border-radius: 10px;
          animation: loadBar 1.5s ease-in-out infinite;
        "></div>
      </div>
      <style>
        @keyframes loadBar {
          0%   { width: 0%;   margin-left: 0%; }
          50%  { width: 60%;  margin-left: 20%; }
          100% { width: 0%;   margin-left: 100%; }
        }
      </style>
    </div>

    <div id="app-wrapper"><div id="root"></div></div>

    <script>
      // Reload de synchronisation : masquer l'écran immédiatement
      var isSyncReload = !!sessionStorage.getItem("__sns_preload");
      if (isSyncReload) {
        var loader = document.getElementById("loading-screen");
        if (loader) loader.style.display = "none";
      }

      function loadApp() {
        var script = document.createElement("script");
        script.src = "app.js";
        script.setAttribute("data-sns-app", "1");
        script.onload = function() {
          window.__appReady = true;

          // Masquer l'écran de chargement (chargement normal)
          var loader = document.getElementById("loading-screen");
          if (loader) {
            loader.style.opacity = "0";
            loader.style.transition = "opacity 0.4s ease";
            setTimeout(function() { loader.remove(); }, 400);
          }

          // Animation de connexion
          var anim = document.createElement("script");
          anim.src = "login-anim.js";
          document.body.appendChild(anim);

          // ── Restaurer la session après un fallback reload ──
          // Si l'injection directe a échoué et qu'on a rechargé,
          // on remet l'utilisateur sans qu'il ait à se reconnecter.
          var savedSession = sessionStorage.getItem("__sns_session");
          if (savedSession) {
            sessionStorage.removeItem("__sns_session");
            (function tryRestore(n) {
              var s = window.__snsSetters;
              if (s && s.setUser && s.getUser) {
                if (!s.getUser()) {
                  try { s.setUser(JSON.parse(savedSession)); } catch (_) {}
                }
              } else if (n < 30) {
                setTimeout(function() { tryRestore(n + 1); }, 100);
              }
            })(0);
          }
        };
        document.body.appendChild(script);
      }

      if (isSyncReload) {
        window.__firebaseReady.then(loadApp).catch(loadApp);
      } else {
        var timeout = new Promise(function(resolve) { setTimeout(resolve, 2000); });
        Promise.race([window.__firebaseReady, timeout]).then(loadApp).catch(loadApp);
      }
    </script>
  </body>
</html>
